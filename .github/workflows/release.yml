name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Create release package
        run: |
          mkdir -p release
          cp -r server.py obdc requirements.txt README.md LICENSE obdc.service screenshots/ release/
          cd release && tar -czvf ../obdc-${{ github.ref_name }}.tar.gz *
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: obdc-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
